general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    path = ~/Bilder/Wallpapers/wallpaper.png
    blur_passes = 0
    blur_size = 0
    brightness = 1.0
    contrast = 1.0
    vibrancy = 1.0
}

# ===== LOGIN SCREEN =====
# Nur: Avatar + Username + Password (wie LoginScreen.qml)

# User Avatar (circle, 120px, center)
# Background für Avatar (circle, 120px)
shape {
    monitor =
    size = 120, 120
    color = rgba(22, 22, 30, 0.6)
    rounding = -1
    border_size = 0
    position = 0, 55
    halign = center
    valign = center
} 

# User Avatar (circle, 120px, center)
image {
    monitor =
    path = ~/.face
    size = 120
    border_size = 0
    border_color = rgba(22, 22, 30, 0)
    color = rgba(22, 22, 30, 0.6)
    rounding = -1
    position = 0, 55
    halign = center
    valign = center
}

# Username / Account Name (unter Avatar, 10px margin)
label {
    monitor =
    text = cmd[] getent passwd $USER | cut -d: -f5 | cut -d, -f1
    color = rgba(255, 255, 255, 1.0)
    font_size = 12
    font_family = RedHatDisplay Bold
    position = 0, -30
    halign = center
    valign = center
}

# Background für Password Icon (links)
shape {
    monitor =
    size = 230, 30
    color = rgba(22, 22, 30, 0.6)
    rounding = 5
    border_size = 0
    position = -17, -70
    halign = center
    valign = center
}

# Password Icon (links vom Input, 16px wie in SDDM)
image {
    monitor =
    path = ~/.config/hypr/icons/password.png
    size = 16
    border_size = 0
    border_color = rgba(0, 0, 0, 0)
    rounding = 0
    position = -115, -70
    halign = center
    valign = center
}

# Password Input (center)
input-field {
    monitor =
    size = 200, 30
    outline_thickness = 0
    dots_size = 0.20
    dots_spacing = 0.4
    dots_center = false
    rounding = 5
    
    outer_color = rgba(22, 22, 30, 0.0)
    inner_color = rgba(22, 22, 30, 0.0)
    font_color = rgb(255, 255, 255)
    
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff">Password                                                                           </span>
    hide_input = false
    
    # States
    check_color = rgba(22, 22, 30, 0.0)
    fail_color = rgba(22, 22, 30, 0.0)
    capslock_color = rgba(22, 22, 30, 0.0)
    
    position = 0, -70
    halign = center
    valign = center
}

# Background für Arrow Icon (rechts)
shape {
    monitor =
    size = 30, 30
    color = rgba(22, 22, 30, 0.6)
    rounding = 0
    border_size = 0
    position = 120, -70
    halign = center
    valign = center
    rounding = 5
}

# Arrow Icon (rechts vom Input, Login-Button Ersatz)
image {
    monitor =
    path = ~/.config/hypr/icons/arrow-right.png
    size = 18
    border_size = 0
    border_color = rgba(0, 0, 0, 0)
    rounding = 0
    position = 120, -70
    halign = center
    valign = center
}

# Capslock Warning (optional, unter Password)
label {
    monitor =
    text = cmd[update:1000] if [[ $(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null) == "1" ]]; then echo "Caps Lock is on"; fi
    color = rgba(255, 255, 255, 1.0)
    font_size = 11
    font_family = RedHatDisplay
    position = 0, -110
    halign = center
    valign = center
}